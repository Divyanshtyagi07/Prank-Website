<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift For You 🎁</title>
  <meta name="title" content="Gift For You 🎁" />
  <meta name="description" content="A sweet little surprise made just for you — click and find your gift! 🎀" />
  <meta name="keywords" content="gift, surprise, fun, web gift, prank, animation" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gift-for-youu.vercel.app/" />
  <meta property="og:title" content="Gift For You 🎁" />
  <meta property="og:description" content="A sweet little surprise made just for you — click and find your gift! 🎀" />
  <meta property="og:image" content="https://gift-for-youu.vercel.app/src/g.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Gift For You 🎁" />
  <meta name="twitter:description" content="A sweet little surprise made just for you — click and find your gift! 🎀" />
  <meta name="twitter:image" content="https://gift-for-youu.vercel.app/src/g.png" />
  <link rel="icon" type="image/png" href="src/g.png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.2/browser/pixi.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Gift For You",
    "url": "https://gift-for-youu.vercel.app/",
    "description": "A sweet little surprise made just for you — click and find your gift! 🎀",
    "image": "https://gift-for-youu.vercel.app/src/g.png"
  }
  </script>
</head>

<body>
<div id="gift-screen" class="gift-screen">
<div class="gift-bg"></div>
<div class="gift-blur-1"></div>
<div class="gift-blur-2"></div>
<div class="gift-content">
<h1 class="gift-title">You Have a <span>Gift</span></h1>
<div class="gift-subtitle">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="18" height="20" rx="2" ry="2"/><line x1="7" x2="17" y1="6" y2="6"/></svg>
<p>Click the gift box to reveal your surprise</p>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:bounce 1s infinite"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
</div>
<div class="gift-box-wrapper" onclick="startCountdown()">
<div class="gift-box">
<div class="gift-box-glow"></div>
<div class="gift-box-inner">
<div class="gift-ribbon-h"></div>
<div class="gift-ribbon-v"></div>
<div class="gift-bow">
<div class="bow-loop"></div>
<div class="bow-center"></div>
<div class="bow-loop"></div>
</div>
</div>
</div>
<div class="gift-hint">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
<span>Tap to open</span>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
</div>
</div>
<button class="gift-btn" onclick="startCountdown()">
<div class="gift-btn-shine"></div>
<span class="gift-btn-content">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8V4m0 12v4"/></svg>
<span>Open Your Gift</span>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1-.15-.949l17.82-7.402a.5.5 0 0 1 .597.747L13 10m0 0l4.217-8.684a.5.5 0 0 1 .757-.134L20.5 3.5"/></svg>
</span>
</button>
<div class="gift-footer">
<span>Made with</span>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 5.5 3c-1.06 0-2.05.25-2.93.7-2.054 1.06-3.476 3.074-3.476 5.471 0 3.585 2.947 6.435 6.5 6.767.574 4.165 3.818 7.762 7.93 7.762 1.659 0 3.223-.38 4.643-1.06" stroke-width="2"/></svg>
<span>just for you</span>
</div>
</div>
</div>
<div id="countdown-screen" class="countdown-screen hidden">
<div class="countdown-scanlines"></div>
<div class="countdown-glitch-bg"></div>
<div class="countdown-corners">
<div class="countdown-corner tl"></div>
<div class="countdown-corner tr"></div>
<div class="countdown-corner bl"></div>
<div class="countdown-corner br"></div>
</div>
<div class="countdown-warnings">
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="top:15%;left:10%"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="top:15%;right:10%"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M9 9h6"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="bottom:15%;left:10%"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M9 9h6"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="bottom:15%;right:10%"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
</div>
<div class="countdown-content">
<div id="countdown-alert" class="countdown-alert">SYSTEM ALERT</div>
<div id="countdown-number" class="countdown-number">3</div>
<div class="countdown-status">INITIATING SEQUENCE...</div>
</div>
<div class="countdown-border"></div>
</div>
<div id="chaos-screen" class="chaos-screen hidden">
<div id="chaos-bg" class="chaos-bg"></div>
<div class="chaos-scanlines"></div>
<div class="chaos-glitch">
<div class="glitch-r"></div>
<div class="glitch-b"></div>
<div class="glitch-bars" id="glitch-bars"></div>
</div>
<div id="windows-container"></div>
</div>

  <script src="script.js"></script>
</body>
</html>
